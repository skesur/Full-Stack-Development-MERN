<!-- create one para in three buttons 
1> Inc button increases font size of para by 1 px every 15ms upto 200px
2> Dec button decreases font size of para by 1 px every 15ms upto 20px
3> Stops Inc or dec
Initially para has font size 18 px and color red -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-1</title>
</head>
<body>
    <p id="p">Hello World!!</p>
    <button onclick="inc()">Inc</button>
    <button onclick="dec()">Dnc</button>
    <button onclick="s()">Stop</button>

    <script>
        fs=18
        function setf(fs){
            var p = document.getElementById("p");
            p.style.fontSize = fs+"px"
            p.style.color = "Green"
        }
        setf(fs)

        function inc(){
            test = setInterval(() => {
                if(fs<200)
                    setf(++fs);
            },50)
        }

        function dec(){
            test = setInterval(() => {
                if(fs>20)
                    setf(--fs);
            },50)
        }

        function s(){
            clearInterval(test)
        }
            

    </script>
</body>
</html>
